<!DOCTYPE html>
<html>
<head>
    <title>Gestión de Productos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1>Listado de Productos</h1>

        <!-- Contenedor superior -->
        <div class="acciones-superiores">
            <button class="btn-abrir" onclick="abrirModal()">
                <i class="fa-solid fa-plus"></i> Agregar Producto
            </button>
        </div>

        <!-- Modal -->
        <div id="modalProducto" class="modal">
            <div class="modal-contenido">
                <span class="cerrar" onclick="cerrarModal()">&times;</span>
                <h2 id="tituloModal">Agregar Producto</h2>

                <label>Nombre del producto</label>
                <input type="text" id="nombre" placeholder="Nombre">
                <label>Descripción del producto</label>
                <input type="text" id="descripcion" placeholder="Descripción">

                <!-- CATEGORÍA CORREGIDA -->
                <label>Categoría</label>
                <select id="categoria">
                    <option value="">Seleccione una categoría</option>
                    <option value="Computadoras de Escritorio">Computadoras de Escritorio</option>
                    <option value="Laptops">Laptops</option>
                    <option value="Componentes">Componentes</option>
                    <option value="Tarjetas Gráficas">Tarjetas Gráficas</option>
                    <option value="Procesadores">Procesadores</option>
                    <option value="Memoria RAM">Memoria RAM</option>
                    <option value="Almacenamiento">Almacenamiento</option>
                    <option value="Monitores">Monitores</option>
                    <option value="Periféricos">Periféricos</option>
                    <option value="Accesorios">Accesorios</option>
                </select>

                <label>Precio del producto</label>
                <input type="number" id="precio" placeholder="Precio">
                <label>Stock del producto</label>
                <input type="number" id="stock" placeholder="Stock">
                <label>Imagen del producto</label>
                <input type="text" id="imagen" placeholder="Imagen (URL)">

                <label>Estado</label>
                <select id="estado">
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                </select>

                <button id="btnGuardar" onclick="agregarProducto()">Guardar</button>
                  
            </div>
        </div>

        <!-- Contenedor de tabla -->
        <div class="tabla-contenedor">
            <table id="tablaProductos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Imagen</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
